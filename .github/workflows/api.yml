# .github/workflows/api.yml
name: Deploy API

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build (linux/arm64)
        run: GOOS=linux GOARCH=arm64 go build -o table-knight-api ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: api/table-knight-api
          retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: api-binary

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy binary to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            table-knight-api \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/table-knight-api

      - name: Swap binary and restart service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            chmod +x /tmp/table-knight-api
            sudo mv /tmp/table-knight-api /opt/table-knight/table-knight-api
            sudo systemctl restart table-knight-api
            sudo systemctl is-active --quiet table-knight-api && echo "Service started OK"
          '
